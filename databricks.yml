bundle:
  name: e2e_data_platform_demo

variables:
  catalog:
    description: "デプロイ先のUnity Catalogカタログ名（各環境で必ず指定してください）"
  schema:
    description: "デプロイ先のUnity Catalogスキーマ名"
    default: e2e_demo
  warehouse_id:
    description: "Dashboard で使用する Serverless SQL Warehouse ID（SQL Warehouses 画面から取得）"

include:
  - resources/*.yml
  # ローカル個人設定のオーバーライド（gitignored、任意）
  # 例: dev target の host を個人workspaceに設定したい場合に作成
  - "*.local.yml"

sync:
  include:
    - src/**
    - notebooks/**
    - app/**
  exclude:
    - app/node_modules/**
    - app/frontend/node_modules/**
    - app/frontend/src/**
    - app/frontend/public/**
    - app/.venv/**
    - app/__pycache__/**

# デプロイ先ワークスペースはCLIプロファイル（~/.databrickscfg）から取得します。
# 例:  databricks bundle deploy -t dev -p <your-profile> --var="catalog=<your-catalog>"
targets:
  dev:
    mode: development
    default: true
