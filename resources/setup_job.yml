resources:
  jobs:
    setup_experiment_data:
      name: "[${bundle.target}] E2E_初期化"
      description: |
        スキーマ・Volume作成とサンプル実験データのアップロード。
        初回のみ手動実行。
      tags:
        project: e2e_data_platform_demo
        type: initialization

      tasks:
        - task_key: setup
          description: "スキーマ・Volume作成 + CSVアップロード"
          notebook_task:
            notebook_path: ../notebooks/00_setup.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          # クラスタ未指定 = サーバーレスコンピュート
